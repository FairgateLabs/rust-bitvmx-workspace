name: Nightly Build

on:
  schedule:
    - cron: '30 1 * * *'

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true
  
jobs:
  nightly:
    strategy:
      matrix:
        submodule: [
          rust-p2p-protocol,
          rust-p2p-handler,
          rust-bitvmx-transaction-monitor,
          rust-bitvmx-transaction-dispatcher,
          rust-bitvmx-protocol-builder,
          rust-bitvmx-key-manager,
          rust-bitvmx-client,
          rust-bitcoin-indexer,
          rust-bitcoin-coordinator,
          BitVMX-cpu
        ]

    uses: FairgateLabs/rust-bitvmx-workspace/.github/workflows/test_template.yml@main
    with:
      repo: 'FairgateLabs/rust-bitvmx-workspace'
      submodule_path: ${{ matrix.submodule }}
      cargo_lock_path: '${{ matrix.submodule }}/Cargo.lock'
      target_path: '${{ matrix.submodule }}/target'
      nightly: true
    secrets: inherit
      
        