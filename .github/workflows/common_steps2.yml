name: 'Build and test steps'
on:
  workflow_call:
    inputs:
      submodule_path:
        required: true
        type: string
      cargo_lock_path:
        required: true
        type: string
      target_path:
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ${{ inputs.submodule_path }}/target
            ${{ inputs.submodule_path }}/${{ inputs.cargo_lock_path }}
          key: ${{ runner.os }}-cargo-${{ hashFiles('${{ inputs.submodule_path }}/${{ inputs.cargo_lock_path }}') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build project
        run: |
          cd ${{ inputs.submodule_path }}
          cargo build --verbose

      - name: Run tests
        run: |
          cd ${{ inputs.submodule_path }}
          cargo test --verbose
