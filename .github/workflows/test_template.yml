name: 'Template Test Action'

on:
  workflow_call:
    inputs:
      repo: 
        description: 'Repository to check out'
        required: true
        type: string
      submodule_path:
        description: 'Path to the submodule within the repository'
        required: true
        type: string
      cargo_lock_path:
        description: 'Path to the Cargo.lock file'
        required: true
        type: string
      target_path:
        description: 'Path to the target directory'
        required: true
        type: string
    secrets:
      REPO_ACCESS_TOKEN:
        description: 'Token to access the repository'
        required: true

jobs:
  test:
    if: ${{ !contains(github.event.pull_request.title, '[cov]') }}
    runs-on: ubuntu-latest
    steps: 
      - name: Set up git with token authentication
        run: |
          # Configure git to use the token for authentication
          git config --global url."https://${{ secrets.REPO_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"
    
      - name: Checkout workspace repository
        run: |
          # Clone the repository with submodules
          git clone --recurse-submodules --depth=1 https://github.com/${{ inputs.repo }} rust-bitvmx-workspace
          # Verify the files in the workspace
          ls -l rust-bitvmx-workspace
      
      - name: Checkout additional repository
        run: |
          # Clone another repository if needed (replace with your desired repo)
          git clone --depth=1 https://github.com/FairgateLabs/${{ inputs.submodule_path }} ${{ inputs.submodule_path }}
          # Verify files of the second repo
          ls -l ${{ inputs.submodule_path }}

      # - name: Move all submodules to correct location
      #   run: |
      #     # Move the submodule directory to the correct place
      #     mv rust-bitcoin-indexer/rust-bitvmx-workspace/* rust-bitcoin-indexer/      

      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ${{ inputs.submodule_path }}/target
            ${{ inputs.submodule_path }}/${{ inputs.cargo_lock_path }}
          key: ${{ runner.os }}-cargo-${{ hashFiles('${{ inputs.submodule_path }}/${{ inputs.cargo_lock_path }}') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build project
        run: |
          pwd
          cd rust-bitvmx-workspace
          cd rust-bitvmx-bitcoin-rpc
          ls -l
          cd ..
          cd ..
          pwd
          cd pwd
          cd rust-bitcoin-indexer
          pwd       
          cd ${{ inputs.submodule_path }}
          ls -l
          pwd
          cargo build --verbose

      - name: Run tests
        run: |
          cd ${{ inputs.submodule_path }}
          cargo test --verbose