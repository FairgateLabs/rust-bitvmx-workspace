name: 'Template Test Action'

on:
  workflow_call:
    inputs:
      repo: 
        description: 'Repository to check out'
        required: true
        type: string
      submodule_path:
        description: 'Path to the submodule within the repository'
        required: true
        type: string
      cargo_lock_path:
        description: 'Path to the Cargo.lock file'
        required: true
        type: string
      target_path:
        description: 'Path to the target directory'
        required: true
        type: string
    secrets:
      REPO_ACCESS_TOKEN:
        description: 'Token to access the repository'
        required: true

jobs:
  test:
    if: ${{ !contains(github.event.pull_request.title, '[cov]') }}
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout workspace
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repo }}
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          ref: main
          path: rust-bitvmx-workspace
          submodules: recursive
          run: |
            ls -l
      
      - name: Checkout repository
        uses: actions/checkout@v4
        with:          
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          run: |
            ls -l

      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ${{ inputs.submodule_path }}/target
            ${{ inputs.submodule_path }}/${{ inputs.cargo_lock_path }}
          key: ${{ runner.os }}-cargo-${{ hashFiles('${{ inputs.submodule_path }}/${{ inputs.cargo_lock_path }}') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build project
        run: |
          ls -l          
          cargo build --verbose

      - name: Run tests
        run: |          
          cargo test --verbose