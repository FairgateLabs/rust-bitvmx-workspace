name: 'Template Test Action'
on:
  workflow_call:
    inputs:
      repo: 
        description: 'Repository to check out'
        required: true
        type: string
      submodule_path:
        description: 'Path to the submodule within the repository'
        required: true
        type: string
      cargo_lock_path:
        description: 'Path to the Cargo.lock file'
        required: true
        type: string
      target_path:
        description: 'Path to the target directory'
        required: true
        type: string
      docker_required:
        description: 'Whether to execute Docker-related steps'
        required: false
        type: boolean
        default: false
      dockerfile_path:
        description: 'Path to Docker file'
        required: false
        type: string        
      docker_compose_path:
        description: 'Path to docker-compose file'
        required: false
        type: string
      nightly:
        description: 'Flag to determine if nightly triggered'
        required: false
        type: boolean
    secrets:
      REPO_ACCESS_TOKEN:
        description: 'Token to access the repository'
        required: true
      SSH_PRIVATE_KEY:
        description: 'Private SSH key to authenticate with GitHub'
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH key for submodule cloning
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Set up git with token authentication
        run: |
          git config --global url."https://${{ secrets.REPO_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"
     
      - name: Checkout workspace repository
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          if [[ "$PR_TITLE" =~ ^\[(.*)\] ]]; then
            BRANCH="${BASH_REMATCH[1]}"
          else
            BRANCH="main"
          fi
          echo "Checking out branch: $BRANCH"
          git clone --recurse-submodules --depth=1 --branch $BRANCH --shallow-submodules https://github.com/${{ inputs.repo }} rust-bitvmx-workspace
      
      - name: Checkout current repository
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ -z "$BRANCH" ]]; then
            BRANCH="main"
          fi
          git clone --depth=1 --branch $BRANCH https://github.com/FairgateLabs/${{ inputs.submodule_path }} ${{ inputs.submodule_path }}
          ls -l ${{ inputs.submodule_path }}

      - name: Move all submodules to correct location
        run: |
          if [[ "$NIGHTLY" == "true" ]]; then
            echo "Running in nightly (from workspace)"
            find rust-bitvmx-workspace -mindepth 1 -maxdepth 1 ! -name '${{ inputs.submodule_path }}' -exec mv {} rust-bitvmx-workspace/${{ inputs.submodule_path }}/ \;
          else
            echo "Running in submodule-triggered mode"
            find /home/runner/work/${{ inputs.submodule_path }}/${{ inputs.submodule_path }}/rust-bitvmx-workspace -mindepth 1 -maxdepth 1 ! -name '${{ inputs.submodule_path }}' -exec mv {} /home/runner/work/${{ inputs.submodule_path }}/${{ inputs.submodule_path }}/ \;
          fi
        env:
          NIGHTLY: ${{ inputs.nightly }}

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Cache Rust toolchain
        uses: actions/cache@v3
        with:
          path: |
            ~/.rustup
            ~/.cargo/bin
          key: ${{ runner.os }}-rustup-${{ hashFiles('**/rust-toolchain*') }}

      - name: Cache Cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Git dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache workspace target directory
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-workspace-target-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-workspace-target-

      - name: Cache submodule target directory
        uses: actions/cache@v3
        with:
          path: ${{ inputs.submodule_path }}/target
          key: ${{ runner.os }}-${{ inputs.submodule_path }}-target-${{ github.run_number }}
          restore-keys: |
            ${{ runner.os }}-${{ inputs.submodule_path }}-target-


      ############ DOCKER SETUP OPTIONAL STEPS ############      
      - name: Set up Docker Buildx
        if: ${{ inputs.docker_required }}
        uses: docker/setup-buildx-action@v2

      - name: Create cache directory
        if: ${{ inputs.docker_required }}
        run: mkdir -p /tmp/.buildx-cache

      - name: Cache Docker layers
        if: ${{ inputs.docker_required }}
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
              ${{ runner.os }}-buildx-

      - name: Build and push Docker image        
        if: ${{ inputs.docker_required }}
        uses: docker/build-push-action@v4
        with:
          run: |
            ls -l
            pwd
          context: ./${{ inputs.submodule_path }}
          file: ./${{ inputs.submodule_path }}/${{ inputs.dockerfile_path }}
          push: false  # Build locally
          tags: user/repository:latest          

      - name: Run docker-compose
        if: ${{ inputs.docker_required }}
        uses: hoverkraft-tech/compose-action@v2.0.1
        with:
          context: ./
          compose-file: "./${{ inputs.submodule_path }}/${{ inputs.docker_compose_path }}"
      ############ END DOCKER OPTIONAL SETUP STEPS ############

      - name: Build project
        run: |
          cd ${{ inputs.submodule_path }}
          cargo build --verbose

      - name: Run tests
        run: |
          cd ${{ inputs.submodule_path }}
          cargo test --verbose