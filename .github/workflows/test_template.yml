name: 'Template Test Action'
on:
  workflow_call:
    inputs:
      repo: 
        description: 'Repository to check out'
        required: true
        type: string
      submodule_path:
        description: 'Path to the submodule within the repository'
        required: true
        type: string
      cargo_lock_path:
        description: 'Path to the Cargo.lock file'
        required: true
        type: string
      target_path:
        description: 'Path to the target directory'
        required: true
        type: string
      docker_required:
        description: 'Whether to execute Docker-related steps'
        required: false
        type: boolean
        default: false
      dockerfile_path:
        description: 'Path to Docker file'
        required: false
        type: string        
      docker_compose_path:
        description: 'Path to docker-compose file'
        required: false
        type: string
    secrets:
      REPO_ACCESS_TOKEN:
        description: 'Token to access the repository'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Run common steps (checkout, auth)
        uses: FairgateLabs/rust-bitvmx-workspace/.github/workflows/common_steps.yml@local_test_workflow

      - name: Move all submodules to correct location
        run: |
          find rust-p2p-protocol/rust-bitvmx-workspace -mindepth 1 -maxdepth 1 ! -name 'rust-p2p-protocol' -exec mv {} rust-p2p-protocol/ \;

      - name: Run common build and test steps
        uses: FairgateLabs/rust-bitvmx-workspace/.github/workflows/common_step2.yml@local_test_workflow
