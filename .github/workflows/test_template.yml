name: 'Template Test Action'
on:
  workflow_call:
    inputs:
      repo: 
        description: 'Repository to check out'
        required: true
        type: string
      submodule_path:
        description: 'Path to the submodule within the repository'
        required: true
        type: string
      cargo_lock_path:
        description: 'Path to the Cargo.lock file'
        required: true
        type: string
      target_path:
        description: 'Path to the target directory'
        required: true
        type: string
    secrets:
      REPO_ACCESS_TOKEN:
        description: 'Token to access the repository'
        required: true

jobs:
  test:
    if: ${{ !contains(github.event.pull_request.title, '[cov]') }}
    runs-on: ubuntu-latest
    steps: 
      - name: Set up git with token authentication
        run: |
          git config --global url."https://${{ secrets.REPO_ACCESS_TOKEN }}@github.com/".insteadOf "https://github.com/"
    
      - name: Checkout workspace repository
        run: |
          git clone --recurse-submodules --depth=1 https://github.com/${{ inputs.repo }} rust-bitvmx-workspace
      
      - name: Checkout current repository
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ -z "$BRANCH" ]]; then
            BRANCH="main"
          fi
          git clone --depth=1 --branch $BRANCH https://github.com/FairgateLabs/${{ inputs.submodule_path }} ${{ inputs.submodule_path }}
          ls -l ${{ inputs.submodule_path }}

      - name: Detect host for container
        run: |
          if (grep -qi microsoft /proc/version || docker info 2>/dev/null | grep -qi 'ostype: windows'); then
            echo "IS_WINDOWS_DOCKER=true" >> $GITHUB_ENV
          else
            echo "IS_WINDOWS_DOCKER=false" >> $GITHUB_ENV
          fi

      - name: Move all submodules to correct location Windows Docker
        if: env.ACT == 'true' && env.IS_WINDOWS_DOCKER == 'true'
        run: |
          echo 'hola'
          find /mnt/c/rust-bitvmx-workspace/${{ inputs.submodule_path }}/${{ inputs.submodule_path }} -mindepth 1 -maxdepth 1 ! -name '${{ inputs.submodule_path }}' -exec mv {} /mnt/c/${{ inputs.submodule_path }}/ \;
      
      - name: Move all submodules to correct location Linux Docker
        if: env.ACT == 'true' && env.IS_WINDOWS_DOCKER == 'false'
        run: |
          echo 'chao'
          find ${{ inputs.submodule_path }}/rust-bitvmx-workspace -mindepth 1 -maxdepth 1 ! -name '${{ inputs.submodule_path }}' -exec mv {} ${{ inputs.submodule_path }}/ \;

      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ${{ inputs.submodule_path }}/target
            ${{ inputs.submodule_path }}/${{ inputs.cargo_lock_path }}
          key: ${{ runner.os }}-cargo-${{ hashFiles('${{ inputs.submodule_path }}/${{ inputs.cargo_lock_path }}') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build project
        run: |
          cd ${{ inputs.submodule_path }}
          cargo build --verbose

      - name: Run tests
        run: |
          cd ${{ inputs.submodule_path }}
          cargo test --verbose